<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title"></title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Fira+Code:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --sand:#e8ddc8; --sand-lt:#f5f0e4; --sand-dk:#c8b898;
  --clay:#b8895a; --clay-dk:#8a5e35;
  --rust:#c4541c; --rust-lt:#d4743c;
  --dusk:#5a4030; --night:#2a1e12; --bone:#f0e8d4;
  --ff-display:'Playfair Display',Georgia,serif;
  --ff-body:'Cormorant Garamond',Georgia,serif;
  --ff-code:'Fira Code',monospace;
  --tr:0.35s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--night);color:var(--bone);font-family:var(--ff-body);font-size:18px;line-height:1.7;overflow-x:hidden;cursor:none;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.18;pointer-events:none;z-index:0;}

/* CURSOR */
#cursor{position:fixed;width:10px;height:10px;background:var(--rust);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;}
#cursor-ring{position:fixed;width:36px;height:36px;border:1px solid var(--clay);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s,height .2s,border-color .2s;opacity:.7;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:18px 60px;backdrop-filter:blur(12px);background:rgba(42,30,18,.82);border-bottom:1px solid rgba(184,137,90,.2);transition:padding var(--tr);}
nav.scrolled{padding:12px 60px;}
.nav-logo{font-family:var(--ff-display);font-size:20px;font-style:italic;color:var(--clay);}
.nav-logo span{color:var(--rust);font-style:normal;}
.nav-links{display:flex;gap:36px;list-style:none;}
.nav-links a{font-family:var(--ff-code);font-size:12px;color:var(--sand-dk);text-decoration:none;letter-spacing:.12em;text-transform:uppercase;position:relative;transition:color var(--tr);}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--rust);transition:width var(--tr);}
.nav-links a:hover{color:var(--bone);}
.nav-links a:hover::after{width:100%;}

/* HERO */
#hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:0 60px;overflow:hidden;}
.hero-bg{position:absolute;inset:0;z-index:0;overflow:hidden;}
.hero-bg svg{position:absolute;bottom:0;left:0;width:100%;height:55%;}
#starCanvas{position:absolute;inset:0;}
.hero-content{position:relative;z-index:2;max-width:800px;}
.hero-eyebrow{font-family:var(--ff-code);font-size:12px;color:var(--rust);letter-spacing:.22em;text-transform:uppercase;margin-bottom:20px;opacity:0;animation:fadeUp .8s ease .2s forwards;}
.hero-name{font-family:var(--ff-display);font-size:clamp(48px,7.5vw,88px);font-weight:700;line-height:1;color:var(--bone);margin-bottom:8px;opacity:0;animation:fadeUp .8s ease .4s forwards;}
.hero-name em{font-style:italic;color:var(--clay);display:block;}
.hero-title{font-family:var(--ff-display);font-size:clamp(16px,2.2vw,24px);font-weight:300;color:var(--sand-dk);margin-bottom:32px;opacity:0;animation:fadeUp .8s ease .6s forwards;}
.hero-desc{font-size:17px;color:var(--sand);max-width:580px;line-height:1.85;margin-bottom:40px;opacity:0;animation:fadeUp .8s ease .8s forwards;}
.hero-cta{display:flex;gap:20px;flex-wrap:wrap;opacity:0;animation:fadeUp .8s ease 1s forwards;}
.hero-contacts{display:flex;gap:20px;margin-top:28px;flex-wrap:wrap;opacity:0;animation:fadeUp .8s ease 1.2s forwards;align-items:center;}
.hero-contact-item{font-family:var(--ff-code);font-size:11px;color:var(--clay);letter-spacing:.1em;text-decoration:none;transition:color var(--tr);}
.hero-contact-item:hover{color:var(--rust-lt);}
.hc-sep{color:var(--clay-dk);}
.btn-primary{padding:14px 36px;background:var(--rust);color:var(--bone);font-family:var(--ff-code);font-size:12px;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;border:none;cursor:none;transition:background var(--tr),transform var(--tr);}
.btn-primary:hover{background:var(--rust-lt);transform:translateY(-2px);}
.btn-outline{padding:13px 36px;background:transparent;color:var(--clay);font-family:var(--ff-code);font-size:12px;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;border:1px solid var(--clay);cursor:none;transition:background var(--tr),color var(--tr),transform var(--tr);}
.btn-outline:hover{background:var(--clay);color:var(--night);transform:translateY(-2px);}
.hero-scroll{position:absolute;bottom:36px;left:60px;display:flex;align-items:center;gap:12px;font-family:var(--ff-code);font-size:11px;color:var(--clay-dk);letter-spacing:.14em;text-transform:uppercase;opacity:0;animation:fadeUp .8s ease 1.4s forwards;}
.scroll-line{width:40px;height:1px;background:var(--clay-dk);animation:scrollPulse 2s ease-in-out infinite;}
@keyframes scrollPulse{0%,100%{width:40px;opacity:1}50%{width:20px;opacity:.4}}
.hero-year{position:absolute;right:60px;top:50%;transform:translateY(-50%) rotate(90deg);font-family:var(--ff-code);font-size:11px;color:rgba(200,184,152,.35);letter-spacing:.22em;z-index:2;}

/* SECTIONS */
section{position:relative;z-index:1;padding:120px 60px;}
.section-label{font-family:var(--ff-code);font-size:11px;color:var(--rust);letter-spacing:.22em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:16px;}
.section-label::after{content:'';flex:1;max-width:60px;height:1px;background:var(--rust);opacity:.5;}
.section-title{font-family:var(--ff-display);font-size:clamp(32px,4vw,52px);font-weight:700;color:var(--bone);margin-bottom:60px;line-height:1.1;}
.section-title em{font-style:italic;color:var(--clay);}

/* ABOUT */
#about{background:linear-gradient(160deg,rgba(42,30,18,1) 0%,rgba(58,40,24,1) 100%);}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;}
.about-text p{color:var(--sand);margin-bottom:20px;font-size:18px;line-height:1.9;}
.about-facts{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:36px;}
.fact-card{background:rgba(184,137,90,.08);border:1px solid rgba(184,137,90,.18);padding:20px 22px;transition:background var(--tr),border-color var(--tr);}
.fact-card:hover{background:rgba(184,137,90,.14);border-color:rgba(184,137,90,.4);}
.fact-num{font-family:var(--ff-display);font-size:40px;font-weight:700;color:var(--clay);line-height:1;margin-bottom:4px;}
.fact-label{font-family:var(--ff-code);font-size:11px;color:var(--sand-dk);letter-spacing:.1em;text-transform:uppercase;}
.about-img-wrap{position:relative;}
.about-avatar{width:100%;aspect-ratio:3/4;background:linear-gradient(145deg,var(--clay-dk) 0%,var(--dusk) 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.about-avatar::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent 0,transparent 8px,rgba(232,216,200,.04) 8px,rgba(232,216,200,.04) 9px);}
.avatar-initials{font-family:var(--ff-display);font-size:96px;font-weight:700;color:rgba(240,232,212,.15);font-style:italic;user-select:none;}
.about-deco{position:absolute;bottom:-16px;right:-16px;width:60%;height:60%;border:1px solid rgba(184,137,90,.25);z-index:-1;}
.about-badge{position:absolute;bottom:24px;left:-20px;background:var(--rust);padding:14px 20px;font-family:var(--ff-code);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--bone);}
.about-badge strong{display:block;font-family:var(--ff-display);font-size:26px;font-style:italic;letter-spacing:0;text-transform:none;}

/* SKILLS */
#skills{background:var(--night);}
.skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.skill-group{background:rgba(200,184,152,.04);border:1px solid rgba(200,184,152,.1);padding:36px 32px;transition:background var(--tr),transform var(--tr);position:relative;overflow:hidden;}
.skill-group::before{content:'';position:absolute;top:0;left:0;width:3px;height:0;background:var(--rust);transition:height .4s ease;}
.skill-group:hover{background:rgba(200,184,152,.08);transform:translateY(-4px);}
.skill-group:hover::before{height:100%;}
.skill-group-icon{font-family:var(--ff-code);font-size:22px;color:var(--clay);margin-bottom:12px;}
.skill-group-title{font-family:var(--ff-display);font-size:20px;font-weight:700;color:var(--bone);margin-bottom:20px;}
.skill-tags{display:flex;flex-wrap:wrap;gap:8px;}
.skill-tag{font-family:var(--ff-code);font-size:11px;padding:5px 12px;border:1px solid rgba(184,137,90,.3);color:var(--sand-dk);letter-spacing:.08em;transition:background var(--tr),color var(--tr),border-color var(--tr);cursor:default;}
.skill-tag:hover{background:var(--clay);color:var(--night);border-color:var(--clay);}
.skill-tag.primary{background:rgba(196,84,28,.15);border-color:rgba(196,84,28,.4);color:var(--rust-lt);}
.skill-tag.primary:hover{background:var(--rust);color:var(--bone);border-color:var(--rust);}

/* EXPERIENCE */
#experience{background:linear-gradient(160deg,rgba(42,30,18,1) 0%,rgba(35,24,14,1) 100%);}
.timeline{position:relative;max-width:860px;}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(184,137,90,.4) 10%,rgba(184,137,90,.4) 90%,transparent);}
.timeline-item{padding-left:52px;padding-bottom:64px;position:relative;opacity:0;transform:translateX(-20px);transition:opacity .6s ease,transform .6s ease;}
.timeline-item.visible{opacity:1;transform:translateX(0);}
.timeline-item:last-child{padding-bottom:0;}
.timeline-dot{position:absolute;left:-5px;top:6px;width:11px;height:11px;border-radius:50%;background:var(--rust);border:2px solid var(--night);box-shadow:0 0 0 3px rgba(196,84,28,.25);}
.timeline-dot.edu{background:var(--clay);box-shadow:0 0 0 3px rgba(184,137,90,.25);}
.timeline-date{font-family:var(--ff-code);font-size:11px;color:var(--clay);letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;}
.timeline-role{font-family:var(--ff-display);font-size:24px;font-weight:700;color:var(--bone);margin-bottom:4px;}
.timeline-company{font-family:var(--ff-body);font-size:16px;color:var(--clay);font-style:italic;margin-bottom:18px;}
.timeline-list{color:var(--sand);font-size:16px;line-height:1.8;margin-bottom:18px;padding-left:20px;}
.timeline-list li{margin-bottom:8px;}
.timeline-plain{color:var(--sand);font-size:16px;line-height:1.8;margin-bottom:18px;}
.highlight{color:var(--rust-lt);font-weight:600;}
.timeline-techs{display:flex;flex-wrap:wrap;gap:8px;}
.tech-pill{font-family:var(--ff-code);font-size:10px;padding:3px 10px;background:rgba(184,137,90,.1);border:1px solid rgba(184,137,90,.25);color:var(--sand-dk);letter-spacing:.08em;}

/* PROJECTS */
#projects{background:var(--night);position:relative;overflow:hidden;}
#projects::before{content:'LIVE';position:absolute;top:60px;right:-30px;font-family:var(--ff-display);font-size:160px;font-weight:700;color:rgba(196,84,28,.04);pointer-events:none;user-select:none;}
.projects-main{display:grid;grid-template-columns:2fr 1fr;gap:2px;margin-bottom:2px;}
.projects-side{display:flex;flex-direction:column;gap:2px;}
.projects-impact{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:2px;}
.project-card{background:rgba(200,184,152,.04);border:1px solid rgba(200,184,152,.1);padding:44px 40px;position:relative;overflow:hidden;transition:background var(--tr);}
.project-card:hover{background:rgba(200,184,152,.08);}
.project-card.featured{border-color:rgba(196,84,28,.3);}
.project-card.sm{padding:28px;}
.project-badge{display:inline-block;font-family:var(--ff-code);font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:5px 12px;background:var(--rust);color:var(--bone);margin-bottom:20px;}
.project-badge.wip{background:transparent;border:1px solid var(--clay);color:var(--clay);}
.project-name{font-family:var(--ff-display);font-size:26px;font-weight:700;color:var(--bone);margin-bottom:12px;line-height:1.2;}
.project-name.sm{font-size:20px;}
.project-name.xs{font-size:17px;}
.project-desc{color:var(--sand);font-size:15px;line-height:1.8;margin-bottom:24px;}
.project-desc.sm{font-size:14px;}
.project-meta-label{font-family:var(--ff-code);font-size:10px;color:var(--clay);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.project-progress{margin-bottom:16px;}
.progress-label{display:flex;justify-content:space-between;font-family:var(--ff-code);font-size:10px;color:var(--clay);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;}
.progress-track{height:2px;background:rgba(200,184,152,.15);overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--clay-dk),var(--rust));transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.project-stack{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}

/* ACTIVITY */
#activity{background:linear-gradient(160deg,rgba(42,30,18,1) 0%,rgba(42,30,18,1) 100%);padding:80px 60px;}
.contrib-grid{display:grid;grid-template-columns:repeat(52,1fr);gap:3px;margin-top:32px;}
.contrib-day{aspect-ratio:1;border-radius:1px;background:rgba(200,184,152,.07);transition:transform .15s;cursor:default;}
.contrib-day:hover{transform:scale(1.5);z-index:2;}
.contrib-day.l1{background:rgba(196,84,28,.2);}
.contrib-day.l2{background:rgba(196,84,28,.45);}
.contrib-day.l3{background:rgba(196,84,28,.7);}
.contrib-day.l4{background:var(--rust);}
.contrib-meta{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-family:var(--ff-code);font-size:11px;color:var(--clay);letter-spacing:.08em;}
.legend-sq{width:10px;height:10px;border-radius:1px;display:inline-block;}

/* CONTACT */
#contact{background:var(--night);text-align:center;padding:120px 60px 80px;}
.contact-tagline{font-family:var(--ff-display);font-size:clamp(32px,5vw,60px);font-weight:700;color:var(--bone);line-height:1.1;margin-bottom:24px;}
.contact-tagline em{font-style:italic;color:var(--clay);}
.contact-sub{font-size:18px;color:var(--sand-dk);max-width:480px;margin:0 auto 48px;}
.contact-links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:60px;}
.contact-link{display:flex;align-items:center;gap:10px;font-family:var(--ff-code);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--sand-dk);text-decoration:none;padding:14px 28px;border:1px solid rgba(200,184,152,.2);transition:border-color var(--tr),color var(--tr),background var(--tr);}
.contact-link:hover{border-color:var(--clay);color:var(--clay);background:rgba(184,137,90,.08);}

/* FOOTER */
footer{border-top:1px solid rgba(200,184,152,.1);padding:24px 60px;display:flex;justify-content:space-between;align-items:center;font-family:var(--ff-code);font-size:11px;color:rgba(200,184,152,.35);letter-spacing:.1em;}
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(184,137,90,.3),transparent);margin:0 60px;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-d1{transition-delay:.1s;}
.reveal-d2{transition-delay:.2s;}

/* RESPONSIVE */
@media(max-width:900px){
  nav{padding:14px 24px;} nav.scrolled{padding:10px 24px;}
  .nav-links{gap:18px;}
  section{padding:80px 24px;}
  #hero{padding:0 24px;}
  .about-grid{grid-template-columns:1fr;}
  .about-img-wrap{order:-1;max-width:300px;}
  .skills-grid{grid-template-columns:1fr 1fr;}
  .projects-main{grid-template-columns:1fr;}
  .projects-impact{grid-template-columns:1fr;}
  .contrib-grid{grid-template-columns:repeat(26,1fr);}
  footer{flex-direction:column;gap:8px;text-align:center;}
  .hero-year{display:none;} .hero-scroll{left:24px;}
  #activity{padding:80px 24px;} #contact{padding:80px 24px 60px;}
}
@media(max-width:600px){
  .skills-grid{grid-template-columns:1fr;}
  .nav-links{display:none;}
  .contact-links{flex-direction:column;align-items:center;}
  .about-facts{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- ═══════════════════════════════════════════════
     HTML SHELL — all text content injected by JS
     ═══════════════════════════════════════════════ -->

<nav id="nav">
  <div class="nav-logo" id="nav-logo"></div>
  <ul class="nav-links" id="nav-links"></ul>
</nav>

<section id="hero">
  <div class="hero-bg">
    <canvas id="starCanvas"></canvas>
    <svg viewBox="0 0 1440 400" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="dg1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4a3020" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#2a1e12" stop-opacity="0.9"/>
        </linearGradient>
        <linearGradient id="dg2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6a4828" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#2a1e12" stop-opacity="0.8"/>
        </linearGradient>
      </defs>
      <path d="M0,320 C200,260 400,380 600,300 C800,220 1000,340 1200,280 C1320,250 1400,300 1440,320 L1440,400 L0,400Z" fill="url(#dg2)"/>
      <path d="M0,360 C180,320 380,400 580,340 C780,280 980,380 1200,340 C1340,320 1400,350 1440,360 L1440,400 L0,400Z" fill="url(#dg1)"/>
    </svg>
  </div>
  <div class="hero-content">
    <div class="hero-eyebrow" id="hero-eyebrow"></div>
    <h1 class="hero-name" id="hero-name"></h1>
    <div class="hero-title" id="hero-title"></div>
    <p class="hero-desc" id="hero-desc"></p>
    <div class="hero-cta" id="hero-cta"></div>
    <div class="hero-contacts" id="hero-contacts"></div>
  </div>
  <div class="hero-scroll"><div class="scroll-line"></div>scroll to explore</div>
  <div class="hero-year" id="hero-year"></div>
</section>

<div class="divider"></div>

<section id="about">
  <div class="section-label" id="about-label"></div>
  <h2 class="section-title" id="about-title"></h2>
  <div class="about-grid">
    <div class="about-text reveal">
      <div id="about-paragraphs"></div>
      <div class="about-facts" id="about-facts"></div>
    </div>
    <div class="about-img-wrap reveal reveal-d2">
      <div class="about-avatar"><div class="avatar-initials" id="avatar-initials"></div></div>
      <div class="about-deco"></div>
      <div class="about-badge" id="about-badge"></div>
    </div>
  </div>
</section>

<div class="divider"></div>

<section id="skills">
  <div class="section-label" id="skills-label"></div>
  <h2 class="section-title" id="skills-title"></h2>
  <div class="skills-grid" id="skills-grid"></div>
</section>

<div class="divider"></div>

<section id="experience">
  <div class="section-label" id="exp-label"></div>
  <h2 class="section-title" id="exp-title"></h2>
  <div class="timeline" id="timeline"></div>
</section>

<div class="divider"></div>

<section id="projects">
  <div class="section-label" id="proj-label"></div>
  <h2 class="section-title" id="proj-title"></h2>
  <div class="projects-main" id="projects-main"></div>
  <div class="projects-impact reveal" id="projects-impact"></div>
</section>

<div class="divider"></div>

<section id="activity">
  <div class="section-label" id="activity-label"></div>
  <h2 class="section-title" id="activity-title" style="margin-bottom:8px;"></h2>
  <p style="color:var(--sand-dk);font-size:15px;font-family:var(--ff-code);" id="activity-sub"></p>
  <div class="contrib-grid" id="contribGrid"></div>
  <div class="contrib-meta">
    <span id="activity-note"></span>
    <div style="display:flex;align-items:center;gap:6px;">
      <span style="color:var(--clay);">Less</span>
      <div class="legend-sq" style="background:rgba(196,84,28,.07)"></div>
      <div class="legend-sq" style="background:rgba(196,84,28,.2)"></div>
      <div class="legend-sq" style="background:rgba(196,84,28,.45)"></div>

/* CURSOR */
const cur = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx+'px'; cur.style.top = my+'px';
});
(function loop(){
  rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
  ring.style.left = rx+'px'; ring.style.top = ry+'px';
  requestAnimationFrame(loop);
})();
document.addEventListener('mouseover', e => {
  if(e.target.closest('a,button,.skill-tag,.project-card,.fact-card')){
    ring.style.width='56px'; ring.style.height='56px'; ring.style.borderColor='var(--rust)';
  } else {
    ring.style.width='36px'; ring.style.height='36px'; ring.style.borderColor='var(--clay)';
  }
});

/* STARS */
const sc = document.getElementById('starCanvas');
const sctx = sc.getContext('2d');
function resizeStar(){sc.width=sc.parentElement.clientWidth;sc.height=sc.parentElement.clientHeight;drawStars();}
function drawStars(){
  sctx.clearRect(0,0,sc.width,sc.height);
  for(let i=0;i<130;i++){
    const x=Math.random()*sc.width, y=Math.random()*sc.height*0.65, r=Math.random()*1.2;
    sctx.beginPath(); sctx.arc(x,y,r,0,Math.PI*2);
    sctx.fillStyle=`rgba(240,232,212,${0.2+Math.random()*0.6})`; sctx.fill();
  }
}
resizeStar(); window.addEventListener('resize', resizeStar);

/* NAV SCROLL */
const navEl = document.getElementById('nav');
window.addEventListener('scroll', () => navEl.classList.toggle('scrolled', window.scrollY>50));

/* REVEAL ON SCROLL */
const revObs = new IntersectionObserver(
  entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }),
  { threshold: 0.12 }
);
document.querySelectorAll('.reveal,.timeline-item').forEach(el => revObs.observe(el));

/* PROGRESS BARS */
const pObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting)
      e.target.querySelectorAll('.progress-fill').forEach(b =>
        setTimeout(() => b.style.width = b.dataset.width+'%', 200));
  });
}, { threshold: 0.3 });
document.querySelectorAll('.project-card').forEach(c => pObs.observe(c));

/* GITHUB CONTRIBUTION GRID */
const grid = document.getElementById('contribGrid');
const lvls = [0,0,0,1,1,1,2,2,3,4];
for(let i=0;i<364;i++){
  const d = document.createElement('div');
  d.className = 'contrib-day';
  if(Math.random()>0.45){ const l=lvls[Math.floor(Math.random()*lvls.length)]; if(l>0) d.classList.add('l'+l); }
  grid.appendChild(d);
}

/* ACTIVE NAV HIGHLIGHT */
const secs = document.querySelectorAll('section[id]');
const nls  = document.querySelectorAll('.nav-links a');
window.addEventListener('scroll', () => {
  let current = '';
  secs.forEach(s => { if(window.scrollY >= s.offsetTop-120) current = s.id; });
  nls.forEach(a => { a.style.color = a.getAttribute('href')==='#'+current ? 'var(--rust-lt)' : ''; });
});
